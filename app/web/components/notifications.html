<script>
/* ═══════════════════════════════════════════════════════════════
   LIGHTHOUSE NOTIFICATION SYSTEM
   Version 2.0 — self-contained, no dependencies
═══════════════════════════════════════════════════════════════ */
(function() {
  'use strict';

  /* ── Constants ─────────────────────────────────────────────── */
  const STORAGE_KEY  = 'lh_notifications_v2';
  const MAX_STORED   = 100;
  const SOUND_KEY    = 'lh_sound_enabled';

  /* ── State ─────────────────────────────────────────────────── */
  const state = {
    notifications:  [],
    isPanelOpen:    false,
    activeFilter:   'all',
    soundEnabled:   localStorage.getItem(SOUND_KEY) !== 'false',
    panelEl:        null,
    bellEl:         null,
    badgeEl:        null,
    audioCtx:       null,
  };

  /* ── Type metadata ─────────────────────────────────────────── */
  const TYPE_META = {
    signal_received: { icon: '📡', label: 'Signal',  toastType: 'info'    },
    kill_switch:     { icon: '🔴', label: 'KillSwt', toastType: 'error'   },
    stale_warning:   { icon: '⚠️', label: 'Stale',   toastType: 'warning' },
    system_alert:    { icon: '🔔', label: 'System',  toastType: 'info'    },
    trade_executed:  { icon: '💹', label: 'Trade',   toastType: 'success' },
  };

  /* ── Helpers ───────────────────────────────────────────────── */
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function relativeTime(ts) {
    const delta = Math.floor((Date.now() - ts) / 1000);
    if (delta < 5)   return 'just now';
    if (delta < 60)  return `${delta}s ago`;
    if (delta < 3600) return `${Math.floor(delta/60)}m ago`;
    if (delta < 86400) return `${Math.floor(delta/3600)}h ago`;
    return new Date(ts).toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  /* ── localStorage persistence ──────────────────────────────── */
  function loadNotifications() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) state.notifications = JSON.parse(raw);
    } catch(e) {
      state.notifications = [];
    }
  }

  function saveNotifications() {
    try {
      // Keep newest MAX_STORED
      const trimmed = state.notifications.slice(-MAX_STORED);
      state.notifications = trimmed;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed));
    } catch(e) {}
  }

  /* ── Web Audio: beep generation ────────────────────────────── */
  function getAudioContext() {
    if (!state.audioCtx) {
      try {
        state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) {}
    }
    return state.audioCtx;
  }

  function playBeep(type) {
    if (!state.soundEnabled) return;
    const ctx = getAudioContext();
    if (!ctx) return;

    const now = ctx.currentTime;

    const configs = {
      // Buy: ascending two-tone chime
      buy: [
        { freq: 523.25, start: 0,    dur: 0.12, vol: 0.3 },
        { freq: 659.25, start: 0.12, dur: 0.14, vol: 0.25 },
        { freq: 783.99, start: 0.24, dur: 0.2,  vol: 0.2  },
      ],
      // Sell: descending two-tone
      sell: [
        { freq: 783.99, start: 0,    dur: 0.12, vol: 0.3 },
        { freq: 659.25, start: 0.12, dur: 0.14, vol: 0.25 },
        { freq: 523.25, start: 0.24, dur: 0.2,  vol: 0.2  },
      ],
      // Alert: single mid-tone
      alert: [
        { freq: 880, start: 0,   dur: 0.08, vol: 0.2 },
        { freq: 880, start: 0.1, dur: 0.08, vol: 0.15 },
      ],
      // Signal: quick ping
      signal: [
        { freq: 1046.5, start: 0,   dur: 0.1, vol: 0.2 },
        { freq: 1174.7, start: 0.1, dur: 0.12, vol: 0.15 },
      ],
      // Kill: urgent low
      kill: [
        { freq: 220, start: 0,    dur: 0.15, vol: 0.4 },
        { freq: 185, start: 0.18, dur: 0.2,  vol: 0.35 },
      ],
    };

    const notes = configs[type] || configs.signal;
    notes.forEach(({ freq, start, dur, vol }) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + start);
      gain.gain.setValueAtTime(0, now + start);
      gain.gain.linearRampToValueAtTime(vol, now + start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + start + dur);
      osc.start(now + start);
      osc.stop(now + start + dur + 0.01);
    });
  }

  function playSoundForType(type, data) {
    if (type === 'trade_executed') {
      const side = data && data.side ? data.side.toLowerCase() : 'buy';
      playBeep(side === 'sell' ? 'sell' : 'buy');
    } else if (type === 'kill_switch') {
      playBeep('kill');
    } else if (type === 'signal_received') {
      playBeep('signal');
    } else {
      playBeep('alert');
    }
  }

  /* ── Core: addNotification ─────────────────────────────────── */
  window.addNotification = function(type, message, data = {}) {
    const notif = {
      id:        uid(),
      type:      type || 'system_alert',
      message:   message || '',
      data:      data,
      timestamp: Date.now(),
      read:      false,
    };

    state.notifications.push(notif);
    saveNotifications();
    refreshBell();

    // If panel is open, re-render list
    if (state.isPanelOpen && state.panelEl) renderList();

    // Sound
    playSoundForType(notif.type, notif.data);

    // Auto-show toast for important types
    const meta = TYPE_META[notif.type] || { toastType: 'info', icon: '🔔' };
    const toastType = notif.type === 'kill_switch'    ? 'error'
                    : notif.type === 'stale_warning'  ? 'warning'
                    : notif.type === 'trade_executed' ? 'success'
                    : 'info';

    if (notif.type === 'trade_executed' && data.side) {
      // Rich trade toast
      showTradeToast(notif, data);
    } else {
      showToast(message, toastType);
    }

    return notif.id;
  };

  /* ── Core: getUnreadCount ──────────────────────────────────── */
  window.getUnreadCount = function() {
    return state.notifications.filter(n => !n.read).length;
  };

  /* ── Core: showToast ───────────────────────────────────────── */
  window.showToast = function(message, type = 'info', duration = 5000) {
    const container = document.getElementById('lh-toast-container');
    if (!container) return;

    const toastIcons = {
      success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️',
    };

    const toast = document.createElement('div');
    toast.className = `lh-toast ${type}`;
    toast.innerHTML = `
      <span class="lh-toast-icon">${toastIcons[type] || 'ℹ️'}</span>
      <div class="lh-toast-body">
        <div class="lh-toast-title">${escHtml(capitalizeFirst(type))}</div>
        <div class="lh-toast-msg">${escHtml(message)}</div>
      </div>
      <button class="lh-toast-close" onclick="this.closest('.lh-toast')._dismiss()">✕</button>
      <div class="lh-toast-progress" style="animation-duration:${duration}ms"></div>
    `;

    const dismiss = () => {
      toast.classList.add('dismissing');
      setTimeout(() => toast.remove(), 450);
    };
    toast._dismiss = dismiss;

    container.appendChild(toast);
    // Force reflow for transition
    requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('visible')));

    const timer = setTimeout(dismiss, duration);
    toast.addEventListener('mouseenter', () => clearTimeout(timer));
    toast.addEventListener('mouseleave', () => setTimeout(dismiss, 1500));

    return toast;
  };

  function showTradeToast(notif, data) {
    const container = document.getElementById('lh-toast-container');
    if (!container) return;

    const isBuy = (data.side || '').toUpperCase() === 'BUY';
    const dir   = isBuy ? 'buy' : 'sell';
    const icon  = isBuy ? '🟢' : '🔴';
    const duration = 6000;

    const toast = document.createElement('div');
    toast.className = `lh-toast ${isBuy ? 'success' : 'error'}`;
    toast.innerHTML = `
      <span class="lh-toast-icon">${icon}</span>
      <div class="lh-toast-body">
        <div class="lh-toast-title">Trade Executed</div>
        <div class="lh-toast-msg">${escHtml(notif.message)}</div>
        <div class="lh-toast-trade">
          <span class="lh-trade-badge ${dir}">${escHtml((data.side||'').toUpperCase())}</span>
          ${data.pair ? `<span class="lh-toast-pair">${escHtml(data.pair)}</span>` : ''}
          ${data.price ? `<span class="lh-toast-price">@ ${escHtml(String(data.price))}</span>` : ''}
          ${data.qty  ? `<span class="lh-toast-price">· ${escHtml(String(data.qty))}</span>` : ''}
        </div>
      </div>
      <button class="lh-toast-close" onclick="this.closest('.lh-toast')._dismiss()">✕</button>
      <div class="lh-toast-progress" style="animation-duration:${duration}ms"></div>
    `;

    const dismiss = () => {
      toast.classList.add('dismissing');
      setTimeout(() => toast.remove(), 450);
    };
    toast._dismiss = dismiss;

    container.appendChild(toast);
    requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('visible')));
    const timer = setTimeout(dismiss, duration);
    toast.addEventListener('mouseenter', () => clearTimeout(timer));
    toast.addEventListener('mouseleave', () => setTimeout(dismiss, 1500));
  }

  /* ── Core: renderNotificationCenter ────────────────────────── */
  window.renderNotificationCenter = function(containerId) {
    const container = typeof containerId === 'string'
      ? document.getElementById(containerId)
      : containerId;

    if (!container) {
      console.warn('[LH Notifications] Container not found:', containerId);
      return;
    }

    container.innerHTML = buildBellHTML();
    bindBellEvents(container);

    state.bellEl  = container.querySelector('.lh-bell-btn');
    state.badgeEl = container.querySelector('.lh-badge');
    state.panelEl = container.querySelector('.lh-panel');

    refreshBell();
  };

  /* ── Bell HTML builder ─────────────────────────────────────── */
  function buildBellHTML() {
    return `
    <div class="lh-bell-wrapper">
      <button class="lh-bell-btn" id="lh-bell-btn" aria-label="Notifications" title="Notifications">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zm.995-14.901a1 1 0 1 0-1.99 0A5.002 5.002 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7a5.002 5.002 0 0 0-3.005-4.901z"/>
        </svg>
      </button>
      <span class="lh-badge hidden" id="lh-badge">0</span>

      <div class="lh-panel" id="lh-panel">
        <!-- Header -->
        <div class="lh-panel-header">
          <span class="lh-panel-title">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" style="opacity:0.7">
              <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zm.995-14.901a1 1 0 1 0-1.99 0A5.002 5.002 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7a5.002 5.002 0 0 0-3.005-4.901z"/>
            </svg>
            Notifications
            <span class="count-pill" id="lh-count-pill">0</span>
          </span>
          <div class="lh-panel-actions">
            <button class="lh-icon-btn" id="lh-sound-btn" title="Toggle sounds">
              🔔 <span id="lh-sound-label">Sound</span>
            </button>
            <button class="lh-icon-btn" id="lh-mark-all-btn" title="Mark all as read">
              ✓ All Read
            </button>
          </div>
        </div>

        <!-- Filter tabs -->
        <div class="lh-filter-tabs">
          <button class="lh-tab active" data-filter="all">All</button>
          <button class="lh-tab" data-filter="trade_executed">Trades</button>
          <button class="lh-tab" data-filter="signal_received">Signals</button>
          <button class="lh-tab" data-filter="kill_switch">KillSwitch</button>
          <button class="lh-tab" data-filter="stale_warning">Stale</button>
        </div>

        <!-- Notification list -->
        <div class="lh-notif-list" id="lh-notif-list"></div>

        <!-- Footer -->
        <div class="lh-panel-footer">
          <span class="lh-footer-info" id="lh-footer-info">No notifications</span>
          <button class="lh-clear-btn" id="lh-clear-btn">Clear All</button>
        </div>
      </div>
    </div>`;
  }

  /* ── Bind events ───────────────────────────────────────────── */
  function bindBellEvents(container) {
    const bell      = container.querySelector('#lh-bell-btn');
    const panel     = container.querySelector('#lh-panel');
    const markAllBtn= container.querySelector('#lh-mark-all-btn');
    const clearBtn  = container.querySelector('#lh-clear-btn');
    const soundBtn  = container.querySelector('#lh-sound-btn');
    const tabs      = container.querySelectorAll('.lh-tab');

    bell.addEventListener('click', (e) => {
      e.stopPropagation();
      togglePanel(panel, bell);
    });

    markAllBtn.addEventListener('click', () => {
      markAllRead();
    });

    clearBtn.addEventListener('click', () => {
      clearAll();
    });

    soundBtn.addEventListener('click', () => {
      state.soundEnabled = !state.soundEnabled;
      localStorage.setItem(SOUND_KEY, state.soundEnabled);
      updateSoundBtn(soundBtn);
      // Play a quick test beep if enabling
      if (state.soundEnabled) playBeep('signal');
    });

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        state.activeFilter = tab.dataset.filter;
        renderList();
      });
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (state.isPanelOpen && !container.contains(e.target)) {
        closePanel(panel, bell);
      }
    });

    // Keyboard: Escape closes
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && state.isPanelOpen) {
        closePanel(panel, bell);
        bell.focus();
      }
    });

    updateSoundBtn(soundBtn);
  }

  function updateSoundBtn(btn) {
    if (!btn) return;
    const label = btn.querySelector('#lh-sound-label');
    if (state.soundEnabled) {
      btn.classList.remove('muted');
      btn.title = 'Sounds ON — click to mute';
      if (label) label.textContent = 'Sound';
      btn.childNodes[0].textContent = '🔔 ';
    } else {
      btn.classList.add('muted');
      btn.title = 'Sounds MUTED — click to enable';
      if (label) label.textContent = 'Muted';
      btn.childNodes[0].textContent = '🔕 ';
    }
  }

  function togglePanel(panel, bell) {
    state.isPanelOpen ? closePanel(panel, bell) : openPanel(panel, bell);
  }

  function openPanel(panel, bell) {
    state.isPanelOpen = true;
    panel.classList.add('open');
    bell.setAttribute('aria-expanded', 'true');
    renderList();
  }

  function closePanel(panel, bell) {
    state.isPanelOpen = false;
    panel.classList.remove('open');
    bell.setAttribute('aria-expanded', 'false');
  }

  /* ── Render notification list ──────────────────────────────── */
  function renderList() {
    const listEl = document.getElementById('lh-notif-list');
    if (!listEl) return;

    const filter = state.activeFilter;
    const items = [...state.notifications].reverse().filter(n => {
      if (filter === 'all') return true;
      return n.type === filter;
    });

    updateFooter(items.length);

    if (items.length === 0) {
      listEl.innerHTML = `
        <div class="lh-empty">
          <svg width="32" height="32" viewBox="0 0 16 16" fill="currentColor" style="display:block;margin:0 auto 8px">
            <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zm.995-14.901a1 1 0 1 0-1.99 0A5.002 5.002 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7a5.002 5.002 0 0 0-3.005-4.901z"/>
          </svg>
          No ${filter === 'all' ? '' : filter.replace('_', ' ')} notifications
        </div>`;
      return;
    }

    listEl.innerHTML = items.map(n => buildNotifItemHTML(n)).join('');

    // Bind click handlers
    listEl.querySelectorAll('.lh-notif-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        markRead(id);
      });
    });
  }

  function buildNotifItemHTML(n) {
    const meta = TYPE_META[n.type] || { icon: '🔔', label: '???', toastType: 'info' };
    const tradeHTML = (n.type === 'trade_executed' && n.data && n.data.side) ? `
      <span class="lh-trade-badge ${n.data.side.toLowerCase()}">${escHtml(n.data.side.toUpperCase())}</span>
      ${n.data.pair  ? `<strong style="font-size:11px;color:var(--lh-text-primary)">${escHtml(n.data.pair)}</strong>` : ''}
      ${n.data.price ? `<span style="font-size:10px;color:var(--lh-text-muted);font-family:monospace">@ ${escHtml(String(n.data.price))}</span>` : ''}
    ` : '';

    return `
      <div class="lh-notif-item ${n.read ? '' : 'unread'} type-${escHtml(n.type)}"
           data-id="${escHtml(n.id)}" role="button" tabindex="0">
        <div class="lh-notif-icon icon-${escHtml(n.type)}">${meta.icon}</div>
        <div class="lh-notif-content">
          <div class="lh-notif-title">
            ${escHtml(n.type.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()))}
            <span class="type-label lh-type-label-${escHtml(n.type)}">${meta.label}</span>
          </div>
          ${tradeHTML ? `<div style="display:flex;align-items:center;gap:5px;margin:3px 0">${tradeHTML}</div>` : ''}
          <div class="lh-notif-msg">${escHtml(n.message)}</div>
          <div class="lh-notif-meta">
            <span class="lh-notif-time">${relativeTime(n.timestamp)}</span>
          </div>
        </div>
        ${!n.read ? '<div class="lh-unread-dot"></div>' : ''}
      </div>`;
  }

  /* ── Mark read / unread ────────────────────────────────────── */
  function markRead(id) {
    const notif = state.notifications.find(n => n.id === id);
    if (notif && !notif.read) {
      notif.read = true;
      saveNotifications();
      refreshBell();
      renderList();
    }
  }

  function markAllRead() {
    let changed = false;
    state.notifications.forEach(n => {
      if (!n.read) { n.read = true; changed = true; }
    });
    if (changed) {
      saveNotifications();
      refreshBell();
      renderList();
    }
  }

  function clearAll() {
    state.notifications = [];
    saveNotifications();
    refreshBell();
    renderList();
  }

  /* ── Bell / badge refresh ──────────────────────────────────── */
  function refreshBell() {
    const count = getUnreadCount();

    if (state.badgeEl) {
      const wasHidden = state.badgeEl.classList.contains('hidden');
      state.badgeEl.textContent = count > 99 ? '99+' : String(count);
      if (count === 0) {
        state.badgeEl.classList.add('hidden');
      } else {
        state.badgeEl.classList.remove('hidden');
        if (wasHidden) {
          // Trigger pop animation
          state.badgeEl.classList.remove('pop');
          void state.badgeEl.offsetWidth; // reflow
          state.badgeEl.classList.add('pop');
        }
      }
    }

    if (state.bellEl) {
      count > 0
        ? state.bellEl.classList.add('has-unread')
        : state.bellEl.classList.remove('has-unread');
    }

    // Update count pill in panel header
    const pill = document.getElementById('lh-count-pill');
    if (pill) pill.textContent = String(state.notifications.length);
  }

  function updateFooter(shownCount) {
    const info = document.getElementById('lh-footer-info');
    if (!info) return;
    const unread = getUnreadCount();
    if (state.notifications.length === 0) {
      info.textContent = 'No notifications';
    } else if (unread > 0) {
      info.textContent = `${unread} unread · ${shownCount} shown`;
    } else {
      info.textContent = `${shownCount} notifications · all read`;
    }
  }

  /* ── Utility ───────────────────────────────────────────────── */
  function capitalizeFirst(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  /* ── Init ──────────────────────────────────────────────────── */
  loadNotifications();

  // Also expose to window for external usage
  window.LighthouseNotifications = {
    addNotification:          window.addNotification,
    showToast:                window.showToast,
    getUnreadCount:           window.getUnreadCount,
    renderNotificationCenter: window.renderNotificationCenter,
    markAllRead,
    clearAll,
    playBeep,
  };

})();
</script>
